<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
      h1 { font-size: 1.5rem; }
      form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
      input[type="text"] { flex: 1; padding: 0.5rem; }
      button { padding: 0.5rem 0.75rem; cursor: pointer; }
      ul { list-style: none; padding: 0; }
      li { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; border-bottom: 1px solid #eee; }
      li.done span { text-decoration: line-through; color: #999; }
      li span { flex: 1; }
    </style>
  </head>
  <body>
    <h1>Todo</h1>
    <form id="new-todo">
      <input type="text" id="title" placeholder="What needs doing?" autocomplete="off" />
      <button type="submit">Add</button>
    </form>
    <ul id="list"></ul>
    <button id="clear-completed" type="button" hidden>Clear completed</button>
    <script src="app.js"></script>
  </body>
</html>
